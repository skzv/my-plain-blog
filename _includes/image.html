{% assign url = '/assets/static/' | append: include.file %}

<a href="{{ url | prepend: site.baseurl | prepend: site.url }}" target="_blank" rel="noopener" class="image">
	<img src="{{ url | prepend: site.baseurl | prepend: site.url }}"
	     alt="{% if include.alt %}{{ include.alt }}{% elsif include.caption %}{{ include.caption }}{% elsif page.title %}{{ page.title }}{% else %}Figure{% endif %}"
	     loading="lazy"
	     decoding="async">
</a>
